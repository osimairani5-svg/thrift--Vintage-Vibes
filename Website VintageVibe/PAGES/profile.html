<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="../css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <div class="activity-card">

        <h2>My Profile</h2>

        <div class="mb-3">

            <label>Name</label>

            <input
                type="text"
                class="form-control"
                value="Vintage User">

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                class="form-control"
                value="user@email.com">

        </div>

        <div class="mb-3">

            <label>Phone</label>

            <input
                type="text"
                class="form-control">

        </div>

        <button class="add-btn">

            Save Profile

        </button>

    </div>

</div>

</body>
</html>
