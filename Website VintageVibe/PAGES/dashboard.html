<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - VintageVibe</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/dashboard.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="../index.html">
            VintageVibe
        </a>

    </div>
</nav>

<section class="dashboard-page">

    <div class="container">

        <div class="dashboard-layout">

            <!-- Sidebar -->

            <aside class="dashboard-sidebar">

                <div class="user-info">

                    <div class="avatar">
                        👤
                    </div>

                    <h5>User Name</h5>

                    <p>user@email.com</p>

                </div>

                <ul>

                    <li>
                        <a href="#">Profile</a>
                    </li>

                    <li>
                        <a href="orders.html">
                            My Orders
                        </a>
                    </li>

                    <li>
                        <a href="#">Wishlist</a>
                    </li>

                    <li>
                        <a href="#">Settings</a>
                    </li>

                    <li>
                        <a href="login.html">
                            Logout
                        </a>
                    </li>

                </ul>

            </aside>

            <!-- Content -->

            <main class="dashboard-content">

                <h2>
                    Welcome Back
                </h2>

                <div class="stats-grid">

                    <div class="stat-card">

                        <h3>0</h3>

                        <p>Orders</p>

                    </div>

                    <div class="stat-card">

                        <h3>0</h3>

                        <p>Wishlist</p>

                    </div>

                    <div class="stat-card">

                        <h3>0</h3>

                        <p>Reviews</p>

                    </div>

                </div>

                <div class="empty-dashboard">

                    <h4>
                        No Activity Yet
                    </h4>

                    <p>
                        Your orders and wishlist will appear here.
                    </p>

                </div>

            </main>

        </div>

    </div>

</section>

</body>
</html>
